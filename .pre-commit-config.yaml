repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check
        entry: .venv/bin/ruff check --fix
        language: system
        types: [python]
      - id: ruff-format
        name: ruff format
        entry: .venv/bin/ruff format
        language: system
        types: [python]
      - id: mypy
        name: mypy
        entry: .venv/bin/mypy
        language: system
        types: [python]
      - id: shellcheck
        name: shellcheck
        entry: .venv/bin/shellcheck
        language: system
        types: [shell]
        args: [--norc]
